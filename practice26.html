<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HW26</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

.container {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.left-image,
.right-image {
  width: 33%;
}

.left-image img,
.right-image img {
  width: 100%;
  height: 300px;
}

.left-image img {
  object-fit: contain;
  border-radius: 18px;
}

.middle-image {
  width: 150px;
  height: 150px;
  flex: 0 0 150px;
}

.middle-image img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.right-image img {
  object-fit: fill;
}
</style>
</head>

<body>

<div class="container">

  <div class="left-image">
    <img src="https://raw.githubusercontent.com/ChewyChloe/113403001/main/practice26_image1.png">
  </div>

  <div class="middle-image">
    <img src="https://raw.githubusercontent.com/ChewyChloe/113403001/main/practice26_image2.png">
  </div>

  <div class="right-image">
    <img src="https://raw.githubusercontent.com/ChewyChloe/113403001/main/practice26_image1.png">
  </div>

</div>

</body>
</html>
