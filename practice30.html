<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Programming Exercise 30</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            padding-top: 50px;
            font-family: Arial, sans-serif;
        }

        .box {
            border: 1px solid black;
            padding: 20px;
            display: inline-block;
            text-align: center;
        }

        .h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: gray;
            transition: color 0.3s;
        }

        .btn {
            margin-top: 10px;
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="h1">Hello</div>
        <button class="btn">Button</button>
    </div>

    <script>
        const text = document.querySelector('.h1');
        const btn = document.querySelector('.btn');

        btn.onmouseover = function() {
            text.style.color = '#ff00ff';
        };

        btn.onclick = function() {
            text.innerText = 'Mouse Click';
            text.style.color = '#8a2be2'; 
        };

        btn.onmouseout = function() {
            if (text.innerText === 'Hello') {
                text.style.color = 'gray';
            }
        };
    </script>

</body>
</html>
