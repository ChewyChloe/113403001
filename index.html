<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Data</title>
  <style>
    table{
      border-collapse: collapse;
      width: 50%;
      margin: 20px 0;
    }

    table, th, td{
      border: 1px solid black;
    }

    th, td{
      padding: 5px;
      text-align: left;
    }

    th{
      font-weight: bold;
    }
  </style>

</head>
<body>
  <table>
    <tr>
      <th>Name</th>
      <th>Student ID</th>
    </tr>
    <tr>
      <td>Pei Jen Lu</td>
      <td>113403001</td>
    </tr>
  </table>
  
</body>
</html>
