<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #f0f0f0;
            padding-top: 50px;
        }

        .white-panel {
            background-color: white;
            width: 600px;
            margin: 0 auto;
            padding: 30px;
            position: relative; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: flex-start;
        }

        table {
            border-collapse: collapse;
            width: 250px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th { background-color: #777; color: white; }
        tr:nth-child(even) { background-color: yellow; }

        .green-box {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 140px;
            border: 2px solid #7eb621;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="white-panel">
        <table>
            <tr><th>Firstname</th><th>Lastname</th></tr>
            <tr><td>1</td><td>1</td></tr>
            <tr><td>2</td><td>2</td></tr>
            <tr><td>3</td><td>3</td></tr>
        </table>

        <div class="green-box">
            This div element has position: fixed; 
            </div>
    </div>

</body>
</html>
