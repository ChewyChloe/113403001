<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>practice 16</title>
    <style>

        .doubleBorder {
            border: double 5px red;
            background-color: #add9e6;
            padding: 10px;
            text-align: center;
        }

        .radiusBorder {
            border: 3px solid #add9e6;
            border-radius: 10px;
            background-color: #ffff01;
            text-align: center;
        }

        .dotBorder {
            background-color: #3cb371;
            border: dotted 6px #d9d9d9;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 class="doubleBorder">Hello World</h1>

    <h1 class="radiusBorder">Hello World</h1>

    <h1 class="dotBorder">Hello World</h1>

</body>
</html>
